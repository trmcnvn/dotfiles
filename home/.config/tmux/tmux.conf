set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# Prefix
unbind C-b
set -g prefix C-\;
bind \; send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# Smart pane switching with Vim awareness.
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind -n C-M-Left if-shell "$is_vim" "send-keys C-M-Left" "select-pane -L"
bind -n C-M-Right if-shell "$is_vim" "send-keys C-M-Right" "select-pane -R"
bind -n C-M-Up if-shell "$is_vim" "send-keys C-M-Up" "select-pane -U"
bind -n C-M-Down if-shell "$is_vim" "send-keys C-M-Down" "select-pane -D"

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind x kill-window

bind -n C-S-PageUp next-window
bind -n C-S-PageDown previous-window

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session
bind X kill-session

bind -n C-M-S-PageUp switch-client -p
bind -n C-M-S-PageDown switch-client -n

# Shell
if-shell "test -f /opt/homebrew/bin/nu" "set-option -g default-shell /opt/homebrew/bin/nu" "set-option -g default-shell /usr/bin/nu"

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 80
set -g window-status-separator ""

# Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "christoomey/vim-tmux-navigator"

# Theme
set -g @plugin "dmmulroy/catppuccin-tmux"
set -g @catppuccin_flavour "mocha"  # Dark theme variant

set -g @catppuccin_window_status_enable "yes"
set -g @catppuccin_window_status_icon_enable "yes"

set -g @catppuccin_icon_window_zoom " "
set -g @catppuccin_icon_window_last "null"
set -g @catppuccin_icon_window_current "null"
set -g @catppuccin_icon_window_mark "null"
set -g @catppuccin_icon_window_silent "null"
set -g @catppuccin_icon_window_activity "null"
set -g @catppuccin_icon_window_bell "null"

set -g @catppuccin_window_middle_separator "null"

set -g @catppuccin_window_default_background "#cdd6f4"
set -g @catppuccin_window_default_color "#181825"
set -g @catppuccin_window_default_fill "all"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_background "#313244"
set -g @catppuccin_window_current_color "#cba6f7"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_maximized_text "null"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_directory_color "#89b4fa"

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @ressurect-strategy-vim "session"
set -g @resurrect-strategy-nvim "session"
set -g @resurrect-capture-pane-contents "on"

set -g @plugin "tmux-plugins/tmux-continuum"
set -g @continuum-restore "on"
set -g @continuum-boot "on"
set -g @continuum-save-interval "10"

# Custom plugins path
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins"

# Install TPM
if "test ! -d ~/.config/tmux/plugins/tpm" \
  "run 'jj git clone --colocate git@github.com:tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
run "~/.config/tmux/plugins/tpm/tpm"
