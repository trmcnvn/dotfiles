# Window Rules for Steam and Gaming
# All Steam windows go to workspace 4 by default
windowrule = workspace 4, match:class (steam)
windowrule = workspace 4, match:class (Steam)
windowrule = workspace 4, match:title (Steam)

# Fullscreen Steam games go to workspace 5
windowrule = workspace 5, match:class (steam_app_*), match:fullscreen true

# Lock Steam games to prevent resizing and manipulation
windowrule = suppress_event resize, match:class (steam_app_*)
windowrule = suppress_event move, match:class (steam_app_*)
windowrule = suppress_event fullscreen, match:class (steam_app_*)
windowrule = stay_focused on, match:class (steam_app_*)

# Battle.net
windowrule = float on, match:title Battle.net
windowrule = center on, match:title Battle.net
windowrule = opacity 1 1, match:title Battle.net
windowrule = size 1600 1200, match:title Battle.net

# World of Warcraft
windowrule = fullscreen on, match:title ^(World of Warcraft)$
windowrule = opacity 1 1, match:title ^(World of Warcraft)$
windowrule = suppress_event resize, match:title ^(World of Warcraft)$
windowrule = suppress_event move, match:title ^(World of Warcraft)$
windowrule = suppress_event fullscreen, match:title ^(World of Warcraft)$
windowrule = stay_focused on, match:title ^(World of Warcraft)$
 
# Diablo IV
windowrule = fullscreen on, match:title ^(Diablo IV)$
windowrule = opacity 1 1, match:title ^(Diablo IV)$
windowrule = suppress_event resize, match:title ^(Diablo IV)$
windowrule = suppress_event move, match:title ^(Diablo IV)$
windowrule = suppress_event fullscreen, match:title ^(Diablo IV)$
windowrule = stay_focused on, match:title ^(Diablo IV)$
